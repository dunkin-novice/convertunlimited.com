name: Generate sitemap and robots

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap.xml and robots.txt
        env:
          BASE_URL: https://convertunlimited.com
          DEPLOY_DIR: .
        run: node scripts/generate-sitemap.js

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml sitemap-index.xml sitemap-*.xml robots.txt
            git commit -m "chore: update sitemap and robots"
            git push
            # IndexNow Ping (Bing/Yandex)
            curl -G "https://www.bing.com/indexnow" \
              --data-urlencode "url=${BASE_URL}/sitemap-index.xml" \
              --data-urlencode "key=6a0342033d1a5fb8za9" # Example key placeholder
          else
            echo "No changes to commit."
          fi
